<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none">
    @for (toast of toastService.toasts(); track toast.id) {
    <div class="relative overflow-hidden pointer-events-auto min-w-[320px] max-w-md p-4 rounded-xl shadow-2xl border-l-[6px] transform transition-all animate-slide-in flex items-center justify-between"
        [ngClass]="{
           'bg-slate-900 border-emerald-500 text-white': toast.type === 'success',
           'bg-slate-900 border-rose-500 text-white': toast.type === 'error',
           'bg-slate-900 border-blue-500 text-white': toast.type === 'info',
           'bg-slate-900 border-amber-500 text-white': toast.type === 'warning',
           'bg-slate-900 border-indigo-500 text-white': toast.type === 'loading'
         }">
        <div class="flex items-center gap-4">
            <!-- Icons remain same color but match dark bg -->
            ...
            <p class="font-bold text-sm tracking-tight">{{ toast.message }}</p>
        </div>
        <button (click)="toastService.remove(toast.id)" class="ml-4 text-slate-400 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        @if (toast.type === 'loading') {
        <div class="absolute bottom-0 left-0 h-0.5 w-full bg-indigo-100">
            <div class="h-full w-1/3 bg-gradient-to-r from-indigo-500 via-cyan-400 to-indigo-500 toast-loading-bar"></div>
        </div>
        }
    </div>
    }
</div>
