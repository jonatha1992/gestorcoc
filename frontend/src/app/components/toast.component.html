<div
  class="fixed right-4 z-[10000] flex w-[min(24rem,calc(100vw-2rem))] flex-col gap-3 pointer-events-none"
  [style.top]="isAuthRoute() ? '1rem' : '4.5rem'"
>
    @for (toast of toastService.toasts(); track toast.id) {
    <div class="relative overflow-hidden pointer-events-auto rounded-2xl border-l-[6px] px-4 py-3 shadow-2xl ring-1 backdrop-blur-sm transform transition-all animate-slide-in"
        [ngClass]="{
           'bg-emerald-50/95 border-emerald-500 text-emerald-950 ring-emerald-200': toast.type === 'success',
           'bg-rose-50/95 border-rose-500 text-rose-950 ring-rose-200': toast.type === 'error',
           'bg-sky-50/95 border-sky-500 text-sky-950 ring-sky-200': toast.type === 'info',
           'bg-amber-50/95 border-amber-500 text-amber-950 ring-amber-200': toast.type === 'warning',
           'bg-indigo-50/95 border-indigo-500 text-indigo-950 ring-indigo-200': toast.type === 'loading'
         }">
        <div class="flex items-start gap-3">
            <div
              class="mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-xl ring-1"
              [ngClass]="{
                'bg-emerald-100 text-emerald-700 ring-emerald-200': toast.type === 'success',
                'bg-rose-100 text-rose-700 ring-rose-200': toast.type === 'error',
                'bg-sky-100 text-sky-700 ring-sky-200': toast.type === 'info',
                'bg-amber-100 text-amber-700 ring-amber-200': toast.type === 'warning',
                'bg-indigo-100 text-indigo-700 ring-indigo-200': toast.type === 'loading'
              }"
            >
              @if (toast.type === 'success') {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 6 9 17l-5-5" />
                </svg>
              } @else if (toast.type === 'error') {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <path d="m15 9-6 6" />
                  <path d="m9 9 6 6" />
                </svg>
              } @else if (toast.type === 'warning') {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                  <path d="M12 9v4" />
                  <path d="M12 17h.01" />
                </svg>
              } @else if (toast.type === 'loading') {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.25" class="opacity-30" />
                  <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <path d="M12 16v-4" />
                  <path d="M12 8h.01" />
                </svg>
              }
            </div>

            <div class="min-w-0 flex-1 pr-3">
              <p class="text-sm font-semibold leading-5 tracking-tight">{{ toast.message }}</p>
            </div>
        </div>
        <button
          (click)="toastService.remove(toast.id)"
          class="absolute right-3 top-3 rounded-md p-1 text-slate-400 transition-colors hover:bg-white/70 hover:text-slate-900"
          [attr.aria-label]="'Cerrar notificacion'"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        @if (toast.type === 'loading') {
        <div class="absolute bottom-0 left-0 h-0.5 w-full bg-indigo-200/80">
            <div class="h-full w-1/3 bg-gradient-to-r from-indigo-500 via-cyan-400 to-indigo-500 toast-loading-bar"></div>
        </div>
        }
    </div>
    }
</div>
