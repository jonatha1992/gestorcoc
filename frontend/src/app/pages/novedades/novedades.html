<div class="space-y-6">
  <!-- Filtros -->
  <app-novedad-filters
    [filters]="filters"
    [canCreate]="canManageNovedades"
    (filtersChange)="onFiltersChange($event)"
    (createClick)="openForm()">
  </app-novedad-filters>

  <!-- Modal Formulario -->
  @if (showForm) {
  <app-novedad-form
    [formData]="formData"
    [actaFormData]="actaFormData"
    [targetType]="targetType"
    [selectedAssets]="selectedAssets"
    [systems]="systems"
    [servers]="servers"
    [cameras]="cameras"
    [gear]="gear"
    [isEditing]="isEditing"
    [canCreate]="canManageNovedades"
    [canEdit]="canManageNovedades"
    (formDataChange)="formData = $event"
    (actaFormChange)="actaFormData = $event"
    (targetTypeChange)="targetType = $event"
    (selectedAssetsChange)="selectedAssets = $event"
    (saveClick)="saveNovedad($event)"
    (closeClick)="closeForm()">
  </app-novedad-form>
  }

  <!-- Modal Acta desde Fila -->
  @if (showRowActaModal && rowActaNovedad) {
  <app-row-acta-modal
    [visible]="true"
    [novedad]="rowActaNovedad"
    [formData]="actaFormData"
    (formDataChange)="actaFormData = $event"
    (closeClick)="closeRowActaModal()"
    (generateClick)="generateActa([rowActaNovedad]); closeRowActaModal()">
  </app-row-acta-modal>
  }

  <!-- Tabla -->
  <app-novedad-table
    [novedades]="novedades"
    [isLoading]="isLoadingTable"
    [currentPage]="currentPage"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [canEdit]="canManageNovedades"
    [canDelete]="canManageNovedades"
    (editClick)="editNovedad($event)"
    (deleteClick)="deleteNovedad($event)"
    (actaClick)="openActaForRow($event)"
    (emailClick)="prepareEmail($event)"
    (pageClick)="goToPage($event)"
    (previousPage)="goToPage(currentPage - 1)"
    (nextPage)="goToPage(currentPage + 1)">
  </app-novedad-table>
</div>
