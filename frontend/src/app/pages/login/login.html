<div
  class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(15,23,42,0.92),_rgba(2,6,23,1)_55%)] text-slate-100 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-5xl grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
    <section
      class="rounded-[2rem] border border-white/10 bg-white/5 backdrop-blur-xl p-8 lg:p-10 shadow-2xl shadow-slate-950/40">
      <div
        class="inline-flex items-center gap-3 rounded-full border border-sky-400/20 bg-sky-400/10 px-4 py-1.5 text-xs font-bold uppercase tracking-[0.3em] text-sky-200">
        Gestor COC
      </div>
      <h1 class="mt-6 text-4xl font-black tracking-tight text-white lg:text-5xl">Acceso operativo centralizado</h1>
      <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-300">
        La aplicacion sigue servida por Django en el mismo dominio. El login protege la SPA y los endpoints API con
        permisos por rol.
      </p>

    </section>

    <section
      class="rounded-[2rem] bg-white text-slate-900 p-8 lg:p-10 shadow-2xl shadow-slate-950/30 border border-slate-200">
      <div>
        <p class="text-xs font-bold uppercase tracking-[0.3em] text-slate-400">Inicio de sesion</p>
        <h2 class="text-2xl font-black tracking-tight text-slate-900">Ingresar al sistema</h2>
      </div>

      <form class="mt-8 space-y-5" (ngSubmit)="submit()">
        <div class="space-y-2">
          <label class="text-[11px] font-bold uppercase tracking-[0.25em] text-slate-500">Usuario</label>
          <input [(ngModel)]="username" name="username" type="text" autocomplete="username"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-900 outline-none transition focus:border-sky-500 focus:bg-white focus:ring-2 focus:ring-sky-100"
            placeholder="usuario">
        </div>

        <div class="space-y-2">
          <label class="text-[11px] font-bold uppercase tracking-[0.25em] text-slate-500">Contraseña</label>
          <div class="relative">
            <input [(ngModel)]="password" name="password" [type]="showPassword() ? 'text' : 'password'" autocomplete="current-password"
              class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 pr-12 text-sm font-medium text-slate-900 outline-none transition focus:border-sky-500 focus:bg-white focus:ring-2 focus:ring-sky-100"
              placeholder="********">
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 flex w-12 items-center justify-center text-slate-400 transition hover:text-slate-700"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C7 20 2.73 16.89 1 12c.92-2.6 2.69-4.8 5-6.32" />
                  <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
                  <path d="M9.88 4.24A10.94 10.94 0 0 1 12 4c5 0 9.27 3.11 11 8a11.05 11.05 0 0 1-4.16 5.94" />
                  <path d="M1 1l22 22" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              }
            </button>
          </div>
        </div>

        @if (errorMessage()) {
        <div class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700">
          {{ errorMessage() }}
        </div>
        }

        <button type="submit" [disabled]="isSubmitting()"
          class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-bold uppercase tracking-[0.25em] text-white transition hover:bg-sky-700 disabled:cursor-not-allowed disabled:opacity-60">
          {{ isSubmitting() ? 'Validando...' : 'Ingresar' }}
        </button>
      </form>
    </section>
  </div>
</div>
